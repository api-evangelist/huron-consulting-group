description: Huron Consulting Group is a global management consultancy serving healthcare, education,
  financial services, and the public sector. It does not operate a public developer API portal and
  does not publish API pricing. References in this scaffold to api.huronconsultinggroup.com and
  developer.huronconsultinggroup.com are placeholders. Huron's commercial model is consulting-engagement
  based.
notes: No public developer API or commercial API surface was identified. Huron is purely a consulting
  firm with no consumption-based API model. Preserved as a trimmed scaffold pending any future public
  developer offering.
